# ============================================================
# THE CONSTITUTION — aggressive profile.
# 账户全权交给 agent。这里剩下的不是策略约束，是软件故障熔断。
# Enforced by code in risk.py, never by prompts.
# Changing this file is a Class-D operation: human only.
# ============================================================
profile: aggressive

account:
  base_currency: USD

hard_limits:
  # 按当前净值的百分比表达——她赚得越多，绝对额度自动越大
  max_risk_per_trade_pct: 35       # 单笔最多押 35% 净值
  max_total_open_risk_pct: 80
  max_new_trades_per_day: 6        # 防失控循环，不防策略
  max_daily_loss_pct: 40           # 触发只停当天，次日自动复活
  consecutive_loss_days_halt: 5    # 唯一需要人工复活的门

whitelist:
  underlyings: []                  # 空 = 不限标的，kernel 只查流动性

instrument_rules:
  allow_naked_short_options: false # 用户唯一的要求，写死
  min_open_interest: 300
  max_relative_spread: 0.15

plan_requirements:                 # Class-B 提案必须带全
  - stop
  - invalidation
  - time_stop
  - target

execution_policy:
  order_type: limit
  start_at: mid
  reprice_interval_sec: 20
  max_reprices: 3                  # 然后撤单，永不追价
  fee_per_contract: 0
  fee_per_share: 0

risk_declaration_tolerance: 0.01
quote_max_age_sec: 15              # human-approved for the read-only Robinhood MCP session
