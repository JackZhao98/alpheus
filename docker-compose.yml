services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: alpheus
      POSTGRES_PASSWORD: alpheus
      POSTGRES_DB: alpheus
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alpheus"]
      interval: 3s
      timeout: 3s
      retries: 20

  kernel:
    build: ./kernel
    environment:
      DATABASE_URL: postgresql://alpheus:alpheus@db:5432/alpheus?sslmode=disable
      DB_TIMEOUT_MS: ${DB_TIMEOUT_MS:-3000}
      BROKER_TIMEOUT_MS: ${BROKER_TIMEOUT_MS:-10000}
      CLAIM_TIMEOUT_MS: ${CLAIM_TIMEOUT_MS:-30000}
      ATTEMPT_STALE_MS: ${ATTEMPT_STALE_MS:-3000}
      MIGRATIONS_DIR: /migrations
      BROKER: ${BROKER:-fake}            # fake | robinhood
      TRADING_MODE: ${TRADING_MODE:-sim} # sim | shadow | read_only | live
      RUNTIME_TOKEN: ${RUNTIME_TOKEN:-}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
      KERNEL_TOKEN: ${KERNEL_TOKEN:-}
      AGENT_WEB_PASSWORD: ${AGENT_WEB_PASSWORD:-}
      AGENT_WEB_SESSION_KEY: ${AGENT_WEB_SESSION_KEY:-}
      # Password-free Agent Lab access. Keep this port on a trusted network.
      AGENT_WEB_AUTH_MODE: ${AGENT_WEB_AUTH_MODE:-local}
      CORTEX_URL: http://cortex-input:8400
      CORTEX_INPUT_TOKEN_FILE: /run/secrets/cortex/input-token
      CORTEX_PAPER_EFFECT_TOKEN_FILE: /run/secrets/cortex/paper-effect-token
      RESEARCH_URL: ${RESEARCH_URL:-http://research-gateway:8300}
      CONSOLE_ORIGIN: ${CONSOLE_ORIGIN:-http://localhost:8100}
      LIVE_TRADING_ENABLED: ${LIVE_TRADING_ENABLED:-false}
      RH_MCP_CAPABILITIES_FILE: ${RH_MCP_CAPABILITIES_FILE:-/docs/rh_mcp_capabilities.json}
      TZ_MARKET: America/New_York
    ports: ["8100:8100"]
    volumes:
      - ./docs:/docs:ro
      - ./db/migrations:/migrations:ro
      - ./.secrets/cortex:/run/secrets/cortex:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --header=\"Authorization: Bearer $${RUNTIME_TOKEN}\" http://127.0.0.1:8100/limits >/dev/null"]
      interval: 3s
      timeout: 3s
      retries: 20
    depends_on:
      db: { condition: service_healthy }

  research-gateway:
    build: ./research-gateway
    environment:
      KERNEL_TOKEN: ${KERNEL_TOKEN:-}
      CORTEX_RESEARCH_TOKEN_FILE: /run/secrets/cortex/research-tool-token
      RESEARCH_DATABASE_URL_FILE: /run/secrets/cortex/research-database-url
      RESEARCH_PRINCIPAL_ID: research-gateway-1
      GEXBOT_PROVIDER_URL: http://gexbot-provider:8500
      GEXBOT_PROVIDER_READ_TOKEN_FILE: /run/secrets/cortex/gexbot-provider-read-token
    volumes:
      - ./.secrets/cortex:/run/secrets/cortex:ro
    depends_on:
      cortex-research-login: { condition: service_completed_successfully }
      gexbot-provider: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8300/health >/dev/null"]
      interval: 3s
      timeout: 3s
      retries: 20

  # Installs only the separately owned AP0/AP1 Agent Platform schemas and
  # default-deny command surface.  It deliberately runs to completion before
  # Cortex Control/Worker are introduced; no Runtime behavior is enabled here.
  agent-platform-migrate:
    image: postgres:16-alpine
    environment:
      DATABASE_URL: postgresql://alpheus:alpheus@db:5432/alpheus?sslmode=disable
      AGENT_PLATFORM_ROOT: /workspace
    volumes:
      - ./:/workspace:ro
    entrypoint: ["/bin/sh", "/workspace/agent-platform/migrations/apply.sh"]
    depends_on:
      db: { condition: service_healthy }
    restart: "no"

  # Provisions one credential-isolated NOINHERIT LOGIN for Cortex Control.
  # The password comes from an owner-only local file and is never shared with
  # Kernel, Worker, Research Gateway, or the migration process at runtime.
  cortex-control-login:
    image: postgres:16-alpine
    environment:
      DATABASE_URL: postgresql://alpheus:alpheus@db:5432/alpheus?sslmode=disable
      CORTEX_DATABASE_PASSWORD_FILE: /run/secrets/cortex/database-password
      AGENT_PLATFORM_ROOT: /workspace
    volumes:
      - ./:/workspace:ro
      - ./.secrets/cortex:/run/secrets/cortex:ro
    entrypoint: ["/bin/sh", "/workspace/agent-platform/provision-control-login.sh"]
    depends_on:
      agent-platform-migrate: { condition: service_completed_successfully }
    restart: "no"

  # Research Gateway receives its own NOINHERIT LOGIN.  Cortex can authorize
  # one read-only Tool but cannot write Research evidence or receive connector
  # credentials; the service identity below owns those durable records.
  cortex-research-login:
    image: postgres:16-alpine
    environment:
      DATABASE_URL: postgresql://alpheus:alpheus@db:5432/alpheus?sslmode=disable
      CORTEX_RESEARCH_DATABASE_PASSWORD_FILE: /run/secrets/cortex/research-database-password
      CORTEX_RESEARCH_DATABASE_URL_FILE: /run/secrets/cortex/research-database-url
      AGENT_PLATFORM_ROOT: /workspace
    volumes:
      - ./:/workspace:ro
      - ./.secrets/cortex:/run/secrets/cortex
    entrypoint: ["/bin/sh", "/workspace/agent-platform/provision-research-login.sh"]
    depends_on:
      agent-platform-migrate: { condition: service_completed_successfully }
    restart: "no"

  # GEXBOT owns its own Research Plane database login and tokens. The token
  # files are host-persistent secrets, never compose environment values.
  gexbot-provider-secrets:
    image: alpine:3.20
    environment:
      GEXBOT_PROVIDER_SECRET_DIR: /run/secrets/cortex
    volumes:
      - ./.secrets/cortex:/run/secrets/cortex
      - ./:/workspace:ro
    entrypoint: ["/bin/sh", "/workspace/agent-platform/provision-gexbot-provider-secrets.sh"]
    restart: "no"

  gexbot-provider-login:
    image: postgres:16-alpine
    environment:
      DATABASE_URL: postgresql://alpheus:alpheus@db:5432/alpheus?sslmode=disable
      GEXBOT_PROVIDER_DATABASE_PASSWORD_FILE: /run/secrets/cortex/gexbot-provider-database-password
      GEXBOT_PROVIDER_DATABASE_URL_FILE: /run/secrets/cortex/gexbot-provider-database-url
      AGENT_PLATFORM_ROOT: /workspace
    volumes:
      - ./:/workspace:ro
      - ./.secrets/cortex:/run/secrets/cortex
    entrypoint: ["/bin/sh", "/workspace/agent-platform/provision-gexbot-provider-login.sh"]
    depends_on:
      agent-platform-migrate: { condition: service_completed_successfully }
      gexbot-provider-secrets: { condition: service_completed_successfully }
    restart: "no"

  # This one-way compatibility bridge decrypts the existing Kernel-held GEXBOT
  # key only into the Provider's private secret file. Kernel itself no longer
  # runs a collector or uses that credential at request time.
  gexbot-provider-secret-export:
    build: ./kernel
    environment:
      DATABASE_URL: postgresql://alpheus:alpheus@db:5432/alpheus?sslmode=disable
      AGENT_WEB_SESSION_KEY: ${AGENT_WEB_SESSION_KEY:-}
      AGENT_SECRET_NAME: gexbot
      AGENT_SECRET_TARGET_FILE: /run/secrets/cortex/gexbot-api-key
      AGENT_SECRET_OPTIONAL: "true"
    volumes:
      - ./.secrets/cortex:/run/secrets/cortex
    entrypoint: ["/export-agent-secret"]
    depends_on:
      db: { condition: service_healthy }
      gexbot-provider-secrets: { condition: service_completed_successfully }
    restart: "no"

  gexbot-provider:
    build:
      context: .
      dockerfile: agent-platform/Dockerfile.gexbot-provider
    environment:
      GEXBOT_PROVIDER_PRINCIPAL_ID: gexbot-provider-1
      GEXBOT_PROVIDER_DATABASE_URL_FILE: /run/secrets/cortex/gexbot-provider-database-url
      GEXBOT_PROVIDER_INGEST_TOKEN_FILE: /run/secrets/cortex/gexbot-provider-ingest-token
      GEXBOT_PROVIDER_READ_TOKEN_FILE: /run/secrets/cortex/gexbot-provider-read-token
      GEXBOT_API_KEY_FILE: /run/secrets/cortex/gexbot-api-key
      GEXBOT_BLOB_ROOT: /var/lib/alpheus/cortex-blobs
      GEXBOT_PROVIDER_ADDR: :8500
    ports: ["127.0.0.1:8500:8500"]
    volumes:
      - cortex_blobdata:/var/lib/alpheus/cortex-blobs
      - ./.secrets/cortex:/run/secrets/cortex:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8500/health"]
      interval: 3s
      timeout: 3s
      retries: 20
    depends_on:
      gexbot-provider-login: { condition: service_completed_successfully }
      gexbot-provider-secret-export: { condition: service_completed_successfully }
    restart: unless-stopped

  cortex-activator-login:
    image: postgres:16-alpine
    environment:
      DATABASE_URL: postgresql://alpheus:alpheus@db:5432/alpheus?sslmode=disable
      CORTEX_ACTIVATOR_PASSWORD_FILE: /run/secrets/cortex/activator-database-password
      AGENT_PLATFORM_ROOT: /workspace
    volumes:
      - ./:/workspace:ro
      - ./.secrets/cortex:/run/secrets/cortex:ro
    entrypoint: ["/bin/sh", "/workspace/agent-platform/provision-activator-login.sh"]
    depends_on:
      agent-platform-migrate: { condition: service_completed_successfully }
    restart: "no"

  cortex-worker-login:
    image: postgres:16-alpine
    environment:
      DATABASE_URL: postgresql://alpheus:alpheus@db:5432/alpheus?sslmode=disable
      CORTEX_WORKER_DATABASE_PASSWORD_FILE: /run/secrets/cortex/worker-database-password
      CORTEX_WORKER_DATABASE_URL_FILE: /run/secrets/cortex/worker-database-url
      AGENT_PLATFORM_ROOT: /workspace
    volumes:
      - ./:/workspace:ro
      - ./.secrets/cortex:/run/secrets/cortex
    entrypoint: ["/bin/sh", "/workspace/agent-platform/provision-worker-login.sh"]
    depends_on:
      agent-platform-migrate: { condition: service_completed_successfully }
    restart: "no"

  cortex-owner-policy-activate:
    image: postgres:16-alpine
    environment:
      CORTEX_ACTIVATOR_DATABASE_URL_FILE: /run/secrets/cortex/activator-database-url
    volumes:
      - ./:/workspace:ro
      - ./.secrets/cortex:/run/secrets/cortex:ro
    entrypoint: ["/bin/sh", "/workspace/agent-platform/activate-cortex-owner-policy.sh"]
    depends_on:
      cortex-activator-login: { condition: service_completed_successfully }
    restart: "no"

  cortex-input:
    build:
      context: .
      dockerfile: agent-platform/Dockerfile.cortex-input
    environment:
      CORTEX_PRINCIPAL_ID: cortex-control-1
      CORTEX_SUBJECT_PRINCIPAL_ID: ${CORTEX_SUBJECT_PRINCIPAL_ID:-owner-1}
      CORTEX_DATABASE_URL_FILE: /run/secrets/cortex/database-url
      CORTEX_INPUT_TOKEN_FILE: /run/secrets/cortex/input-token
      CORTEX_PAPER_EFFECT_TOKEN_FILE: /run/secrets/cortex/paper-effect-token
      CORTEX_WORKER_CONTROL_TOKEN_FILE: /run/secrets/cortex/worker-control-token
      CORTEX_RESEARCH_TOKEN_FILE: /run/secrets/cortex/research-tool-token
      CORTEX_RESEARCH_URL: http://research-gateway:8300
      CORTEX_KERNEL_URL: http://kernel:8100
      CORTEX_BLOB_ROOT: /var/lib/alpheus/cortex-blobs
      CORTEX_INPUT_ADDR: :8400
    ports: ["127.0.0.1:8400:8400"]
    volumes:
      - cortex_blobdata:/var/lib/alpheus/cortex-blobs
      - ./.secrets/cortex:/run/secrets/cortex:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8400/health"]
      interval: 3s
      timeout: 3s
      retries: 20
    depends_on:
      cortex-control-login: { condition: service_completed_successfully }
      cortex-owner-policy-activate: { condition: service_completed_successfully }
      cortex-research-login: { condition: service_completed_successfully }

  cortex-openai-secret-export:
    build: ./kernel
    environment:
      DATABASE_URL: postgresql://alpheus:alpheus@db:5432/alpheus?sslmode=disable
      AGENT_WEB_SESSION_KEY: ${AGENT_WEB_SESSION_KEY:-}
      CORTEX_OPENAI_API_KEY_FILE: /run/secrets/cortex/openai-api-key
    volumes:
      - ./.secrets/cortex:/run/secrets/cortex
    entrypoint: ["/export-agent-secret"]
    depends_on:
      db: { condition: service_healthy }
    restart: "no"

  cortex-worker:
    build:
      context: .
      dockerfile: agent-platform/Dockerfile.cortex-worker
    environment:
      CORTEX_WORKER_PRINCIPAL_ID: cortex-worker-1
      CORTEX_WORKER_DATABASE_URL_FILE: /run/secrets/cortex/worker-database-url
      CORTEX_WORKER_CONTROL_TOKEN_FILE: /run/secrets/cortex/worker-control-token
      OPENAI_API_KEY_FILE: /run/secrets/cortex/openai-api-key
      CORTEX_BLOB_ROOT: /var/lib/alpheus/cortex-blobs
      CORTEX_CONTROL_URL: http://cortex-input:8400
      CORTEX_MODEL: gpt-5.6-sol
      CORTEX_WORKER_CONCURRENCY: "4"
    volumes:
      - cortex_blobdata:/var/lib/alpheus/cortex-blobs:ro
      - ./.secrets/cortex:/run/secrets/cortex:ro
    depends_on:
      cortex-worker-login: { condition: service_completed_successfully }
      cortex-openai-secret-export: { condition: service_completed_successfully }
      cortex-input: { condition: service_healthy }
    restart: unless-stopped

volumes:
  pgdata:
  cortex_blobdata:
